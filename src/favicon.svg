<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Sombra para dar a impressão de uma foto física (Polaroid) flutuando na aba -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Gradiente vibrante para o coração -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff0844"/>
      <stop offset="100%" stop-color="#b8002b"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rotacionado levemente para dar charme -->
  <g transform="translate(50, 50) rotate(-4) translate(-50, -50)">
    
    <!-- Base branca da foto Polaroid -->
    <rect x="5" y="4" width="90" height="92" rx="3" fill="#ffffff" filter="url(#shadow)"/>
    
    <!-- Área escura da foto -->
    <rect x="10" y="9" width="80" height="68" fill="#121212" rx="1"/>
    
    <!-- Coração Gigante ocupando o centro da foto polaroid -->
    <path d="M 50,25 
             C 50,25 45,15 32,15 
             C 15,15 15,35 15,35 
             C 15,55 50,68 50,68 
             C 50,68 85,55 85,35 
             C 85,35 85,15 68,15 
             C 55,15 50,25 50,25 Z" 
          fill="url(#heartGrad)" filter="url(#glow)"/>
          
  </g>
</svg>
